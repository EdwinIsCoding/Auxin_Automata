name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python: lint + test (sdk + twin) ───────────────────────────────────────
  python-lint-test:
    name: Python Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install SDK deps
        run: cd sdk && uv sync

      - name: Ruff lint (sdk)
        run: cd sdk && uv run ruff check .

      - name: Ruff format check (sdk)
        run: cd sdk && uv run ruff format --check .

      - name: Pytest (sdk)
        run: cd sdk && uv run pytest --cov=auxin_sdk --cov-fail-under=80

      - name: Install twin deps
        run: cd twin && uv sync

      - name: Ruff lint (twin)
        run: cd twin && uv run ruff check .

      - name: Pytest (twin)
        run: cd twin && uv run pytest

  # ── Anchor: build + test ────────────────────────────────────────────────────
  # Skipped until Phase 2A initialises the Anchor workspace (programs/Anchor.toml).
  anchor-build-test:
    name: Anchor Build & Test
    runs-on: ubuntu-latest
    if: hashFiles('programs/Anchor.toml') != ''
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: programs

      - name: Install Solana CLI 1.18.26
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v1.18.26/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor via avm
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install 0.30.1
          avm use 0.30.1

      - name: Set up Node 20 + pnpm
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install program test deps
        run: cd programs && pnpm install

      - name: Anchor build
        run: cd programs && anchor build

      - name: Anchor test (localnet)
        run: cd programs && anchor test

  # ── Dashboard: build + lint ─────────────────────────────────────────────────
  dashboard-build-lint:
    name: Dashboard Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: dashboard/pnpm-lock.yaml

      - name: Install deps
        run: cd dashboard && pnpm install

      - name: Lint
        run: cd dashboard && pnpm lint

      - name: Build
        run: cd dashboard && pnpm build
        env:
          NEXT_PUBLIC_HELIUS_RPC_URL: ""
          NEXT_PUBLIC_PROGRAM_ID: "11111111111111111111111111111111"
          NEXT_PUBLIC_BRIDGE_WS_URL: "ws://localhost:8766"

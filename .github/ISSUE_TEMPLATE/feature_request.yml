name: Feature Request
description: Propose a new feature or enhancement
labels: ["enhancement"]
body:
  - type: dropdown
    id: workspace
    attributes:
      label: Target Workspace
      options:
        - sdk
        - programs
        - edge
        - dashboard
        - twin
        - scripts
        - other
    validations:
      required: true

  - type: dropdown
    id: phase
    attributes:
      label: Relevant Phase
      options:
        - Phase 0 — Bootstrap
        - Phase 1 — Foundation
        - Phase 2A — Blockchain
        - Phase 2B — Edge / Hardware
        - Phase 2C — Dashboard
        - Phase 3 — Bridge & Integration
        - Phase 4 — Hardening & Submission
        - Post-hackathon
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered

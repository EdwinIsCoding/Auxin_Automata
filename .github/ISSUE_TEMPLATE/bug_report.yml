name: Bug Report
description: Something is broken
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Please fill in as much detail as possible."

  - type: dropdown
    id: workspace
    attributes:
      label: Affected Workspace
      options:
        - sdk
        - programs
        - edge
        - dashboard
        - twin
        - scripts
        - other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Set AUXIN_SOURCE=...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs or Error Output
      render: shell

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, Python version, Node version, Anchor version"
